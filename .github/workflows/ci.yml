name: "CI: next-postgres-shadcn"

on:
  push:
    branches:
      - development
      - agent/next-postgres-shadcn
    paths:
      - "workspace/projects/next-app/src/**"
      - "workspace/projects/next-app/prisma/**"
      - "workspace/projects/next-app/public/**"
      - "workspace/projects/next-app/package.json"
      - "workspace/projects/next-app/pnpm-lock.yaml"
      - "workspace/projects/next-app/tsconfig.json"
      - "workspace/projects/next-app/next.config.*"
      - "workspace/projects/next-app/tailwind.config.*"
      - "workspace/projects/next-app/postcss.config.*"
      - "workspace/projects/next-app/vitest.config.*"
      - "workspace/projects/next-app/playwright.config.*"
      - "workspace/projects/next-app/.prettierignore"
      - "workspace/projects/next-app/.gitignore"
      - "workspace/projects/next-app/.eslintrc*"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sandbox
          POSTGRES_PASSWORD: sandbox
          POSTGRES_DB: sandbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sandbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sandbox:sandbox@localhost:5432/sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: workspace/projects/next-app/node_modules
          key: node-modules-${{ hashFiles('workspace/projects/next-app/pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        working-directory: workspace/projects/next-app
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: workspace/projects/next-app
        run: pnpm exec prisma generate

      - name: Run migrations
        working-directory: workspace/projects/next-app
        run: pnpm exec prisma migrate deploy

      - name: Lint
        working-directory: workspace/projects/next-app
        run: pnpm run lint

      - name: Format check
        working-directory: workspace/projects/next-app
        run: pnpm run format:check

      - name: Type check
        working-directory: workspace/projects/next-app
        run: pnpm run type-check

      - name: Build
        working-directory: workspace/projects/next-app
        run: pnpm run build

      - name: Test
        working-directory: workspace/projects/next-app
        run: pnpm test

      - name: Install Playwright browsers
        working-directory: workspace/projects/next-app
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        working-directory: workspace/projects/next-app
        run: pnpm run test:e2e
