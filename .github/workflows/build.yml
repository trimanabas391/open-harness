name: Build Open Harness

permissions:
    contents: read
    packages: write

on:
    push:
        tags:
            - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

jobs:
    build:
        runs-on: ubuntu-latest
        environment: Dev
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Parse tag
              id: parse
              run: |
                  # Expected tag format: YYYY.M.D or YYYY.M.D-N
                  # e.g. 2026.4.4, 2026.4.4-1
                  VERSION=${GITHUB_REF#refs/tags/}
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.GHCR_USERNAME || github.actor }}
                  password: ${{ secrets.GHCR_PAT }}

            - name: Build and push
              run: |
                  IMAGE=ghcr.io/ryaneggz/open-harness:${{ steps.parse.outputs.version }}
                  LATEST=ghcr.io/ryaneggz/open-harness:latest

                  echo "Building: $IMAGE and $LATEST"
                  docker build -f .devcontainer/Dockerfile -t $IMAGE -t $LATEST .
                  docker push $IMAGE
                  docker push $LATEST
