name: Build Sandbox

permissions:
    contents: read
    packages: write

on:
    push:
        tags:
            - "ubuntu-*"

jobs:
    build:
        runs-on: ubuntu-latest
        environment: Dev
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Parse tag
              id: parse
              run: |
                  # Expected tag format: sandbox-<type>-<version>
                  # e.g. sandbox-ubuntu-v1.0.0
                  TAG=${GITHUB_REF#refs/tags/sandbox-}
                  SANDBOX=${TAG%-*}
                  VERSION=${TAG##*-}
                  echo "sandbox=$SANDBOX" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Sandbox: $SANDBOX, Version: $VERSION"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.GHCR_USERNAME || github.actor }}
                  password: ${{ secrets.GHCR_PAT }}

            - name: Build and push
              run: |
                  IMAGE=ghcr.io/ruska-ai/sandbox:${{ steps.parse.outputs.sandbox }}-${{ steps.parse.outputs.version }}
                  LATEST=ghcr.io/ruska-ai/sandbox:${{ steps.parse.outputs.sandbox }}-latest

                  echo "Building: $IMAGE and $LATEST"
                  docker build -t $IMAGE -t $LATEST ${{ steps.parse.outputs.sandbox }}/
                  docker push $IMAGE
                  docker push $LATEST
