# Heartbeat Schedule Configuration
# =================================
# Format: <cron-expression> | <file-path> | [agent] | [active_start-active_end]
#
# - cron-expression: Standard 5-field cron (min hour dom mon dow)
# - file-path: Relative to ~/harness/workspace/
# - agent: (optional) Override HEARTBEAT_AGENT env var. Default: claude
# - active_start-active_end: (optional) Hours (0-23). Only run during this window.
#
# After editing, run: heartbeat.sh sync (or from host: openharness heartbeat sync <name>)

*/30 * * * * | heartbeats/build-health.md | claude | 9-21
0 * * * * | heartbeats/issue-triage.md | claude
50 23 * * * | heartbeats/nightly-release.md | claude
0 8 * * * | heartbeats/backlog-rank.md | claude
0 */2 * * * | heartbeats/implement.md | claude | 9-21
